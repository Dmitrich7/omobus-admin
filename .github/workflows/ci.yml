name: CI
on:
  push:
    branches: [ "main" ]
jobs:
  init:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 24.x ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm ci
      - run: npm run build



      - name: setup key
        run: mkdir -p "$HOME/.ssh"
      - run: echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/sshPrivateKey"
      - run: chmod 600 "$HOME/.ssh/sshPrivateKey"

      - name: deploy
        run: cd dist/assets
      - run: cd dist/assets && scp -r -P 22100 -i $HOME/.ssh/sshPrivateKey -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/etc/omobus-scgi.d/markup-admin/htdocs
